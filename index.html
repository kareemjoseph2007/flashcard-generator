<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kix</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./style.css">
</head>
<body>
  <section id="authSection" class="auth-wrap">
    <div class="card">
      <div class="auth-logo">
        <svg width="120" height="40" viewBox="0 0 240 80" xmlns="http://www.w3.org/2000/svg">
          <defs>
            <linearGradient id="ng" x1="0%" y1="0%" x2="100%" y2="100%">
              <stop offset="0%" stop-color="#6C63FF"/>
              <stop offset="100%" stop-color="#FF6584"/>
            </linearGradient>
            <linearGradient id="tg" x1="0%" y1="0%" x2="100%" y2="100%">
              <stop offset="0%" stop-color="#A8A3FF"/>
              <stop offset="60%" stop-color="#6C63FF"/>
              <stop offset="100%" stop-color="#FF6584"/>
            </linearGradient>
          </defs>
          <rect x="0" y="12" width="44" height="56" rx="10" fill="#1A1A2E" stroke="rgba(108,99,255,0.2)" stroke-width="1"/>
          <rect x="5" y="17" width="28" height="20" rx="4" fill="#21213A" stroke="rgba(108,99,255,0.3)" stroke-width="1"/>
          <rect x="5" y="22" width="28" height="5" fill="url(#ng)" opacity="0.8"/>
          <g transform="rotate(-6, 27, 47)">
            <rect x="13" y="38" width="28" height="20" rx="4" fill="#2A2A4A" stroke="rgba(108,99,255,0.5)" stroke-width="1"/>
            <rect x="13" y="43" width="28" height="5" fill="url(#ng)"/>
            <rect x="17" y="50" width="8" height="6" rx="1.5" fill="none" stroke="url(#ng)" stroke-width="0.8"/>
            <line x1="17" y1="52.5" x2="25" y2="52.5" stroke="url(#ng)" stroke-width="0.6"/>
            <line x1="21" y1="50" x2="21" y2="56" stroke="url(#ng)" stroke-width="0.6"/>
          </g>
          <text x="55" y="56" font-family="Syne, sans-serif" font-weight="800" font-size="38" letter-spacing="-1" fill="url(#tg)">kix</text>
        </svg>
      </div>
      <p class="muted space-b-14">Sign up or log in to create and save decks.</p>
      <form id="loginForm" novalidate>
        <div class="grid">
          <div>
            <label for="authEmail">Email</label>
            <input id="authEmail" type="email" placeholder="you@example.com" />
          </div>
          <div>
            <label for="authPassword">Password</label>
            <input id="authPassword" type="password" placeholder="Minimum 6 characters" />
          </div>
        </div>
        <div class="actions">
          <button id="signupBtn" type="button" class="btn-primary">Sign Up</button>
          <button id="magicLinkBtn" type="button" class="btn-soft">Magic Link</button>
          <button id="loginBtn" type="button" class="btn-soft">Log In</button>
        </div>
      </form>
      <div id="authStatus" class="status" role="alert" aria-live="polite"></div>
    </div>
  </section>

  <main id="appSection" class="container hidden">
    <div class="topbar">
      <div class="topbar-brand">
        <svg width="96" height="32" viewBox="0 0 240 80" xmlns="http://www.w3.org/2000/svg">
          <defs>
            <linearGradient id="ng2" x1="0%" y1="0%" x2="100%" y2="100%">
              <stop offset="0%" stop-color="#6C63FF"/>
              <stop offset="100%" stop-color="#FF6584"/>
            </linearGradient>
            <linearGradient id="tg2" x1="0%" y1="0%" x2="100%" y2="100%">
              <stop offset="0%" stop-color="#A8A3FF"/>
              <stop offset="60%" stop-color="#6C63FF"/>
              <stop offset="100%" stop-color="#FF6584"/>
            </linearGradient>
          </defs>
          <rect x="0" y="12" width="44" height="56" rx="10" fill="#1A1A2E" stroke="rgba(108,99,255,0.2)" stroke-width="1"/>
          <rect x="5" y="17" width="28" height="20" rx="4" fill="#21213A" stroke="rgba(108,99,255,0.3)" stroke-width="1"/>
          <rect x="5" y="22" width="28" height="5" fill="url(#ng2)" opacity="0.8"/>
          <g transform="rotate(-6, 27, 47)">
            <rect x="13" y="38" width="28" height="20" rx="4" fill="#2A2A4A" stroke="rgba(108,99,255,0.5)" stroke-width="1"/>
            <rect x="13" y="43" width="28" height="5" fill="url(#ng2)"/>
            <rect x="17" y="50" width="8" height="6" rx="1.5" fill="none" stroke="url(#ng2)" stroke-width="0.8"/>
            <line x1="17" y1="52.5" x2="25" y2="52.5" stroke="url(#ng2)" stroke-width="0.6"/>
            <line x1="21" y1="50" x2="21" y2="56" stroke="url(#ng2)" stroke-width="0.6"/>
          </g>
          <text x="55" y="56" font-family="Syne, sans-serif" font-weight="800" font-size="38" letter-spacing="-1" fill="url(#tg2)">kix</text>
        </svg>
        <p id="userInfo" class="muted"></p>
      </div>
      <button id="logoutBtn" class="btn-danger">Log Out</button>
    </div>

    <div class="grid two">
      <section class="card">
        <h2>Create New Deck</h2>
        <p class="muted space-b-10">Paste text or upload a PDF, then generate 15 cards with AI.</p>

        <div class="space-b-10">
          <label for="groqApiKey">Groq API Key (saved locally)</label>
          <input id="groqApiKey" type="password" placeholder="gsk_..." />
        </div>

        <div class="space-b-10">
          <label for="deckTitle">Deck title</label>
          <input id="deckTitle" type="text" placeholder="e.g. Biology Chapter 3" />
        </div>

        <div class="space-b-10">
          <label for="sourceText">Source text</label>
          <textarea id="sourceText" placeholder="Paste notes, article text, lecture transcript..."></textarea>
        </div>

        <div class="space-b-10">
          <label for="pdfInput">Or upload PDF</label>
          <input id="pdfInput" type="file" accept=".pdf,application/pdf" />
          <p id="pdfStatus" class="muted space-t-8 text-sm"></p>
        </div>

        <div class="actions">
          <button id="generateBtn" class="btn-primary">Generate 15 Flashcards</button>
          <button id="saveGroqBtn" class="btn-ghost">Save API Key</button>
        </div>
        <div id="generateStatus" class="status"></div>
      </section>

      <section class="card">
        <h2>Saved Decks</h2>
        <p class="muted">Open any deck to study again.</p>
        <div id="decksContainer" class="deck-list"></div>
      </section>
    </div>

    <section id="studySection" class="card hidden study-section">
      <div class="study-head">
        <div>
          <h2 id="studyDeckTitle">Study Deck</h2>
          <p id="studyMeta" class="muted"></p>
        </div>
        <div class="progress-pill" id="studyProgress">Card 1 / 1</div>
      </div>

      <div class="study-controls">
        <button id="modeFlipBtn" class="btn-primary">Flip Mode</button>
        <button id="modeQuizBtn" class="btn-soft">Quiz Mode</button>
        <button id="weakModeBtn" class="btn-ghost">Focus on Weak Cards</button>
        <button id="prevBtn" class="btn-ghost">Previous</button>
        <button id="nextBtn" class="btn-ghost">Next</button>
      </div>

      <div id="flipModeView">
        <div class="flip-stage">
          <div id="flipCard" class="flip-card">
            <div class="flip-face front">
              <div class="flash-title">Question</div>
              <div id="flipQuestion" class="flash-content"></div>
              <div class="muted text-xs">Click to reveal answer</div>
            </div>
            <div class="flip-face back">
              <div class="flash-title">Answer</div>
              <div id="flipAnswer" class="flash-content"></div>
              <div class="muted text-xs">Click to flip back</div>
            </div>
          </div>
        </div>
      </div>

      <div id="quizModeView" class="hidden">
        <div class="quiz-wrap">
          <div class="flash-title">Question</div>
          <div id="quizQuestion" class="flash-content flash-content-unlimited"></div>
          <div>
            <label for="quizInput">Your answer</label>
            <input id="quizInput" type="text" placeholder="Type your answer..." />
          </div>
          <div class="actions">
            <button id="checkAnswerBtn" class="btn-primary">Check Answer</button>
            <button id="showAnswerBtn" class="btn-soft">Show Correct Answer</button>
          </div>
          <div id="quizFeedback" class="status"></div>
          <div id="quizCorrectAnswer" class="muted"></div>
        </div>
      </div>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    document.getElementById("loginForm")?.addEventListener("submit", function (e) {
      e.preventDefault();
    });
  </script>
  <script src="./app.js" defer></script>
</body>
</html>
